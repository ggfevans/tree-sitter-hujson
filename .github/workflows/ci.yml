name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  grammar-test:
    name: Grammar Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # tree-sitter-cli is a pinned devDependency installed from the committed
      # package-lock.json; expose its bin so `tree-sitter` and `make generate`
      # (which calls $(TS) = tree-sitter) resolve to the locked version.
      - name: Install pinned tree-sitter CLI and deps
        run: |
          npm ci --no-audit --no-fund
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate parser (must be a no-op against committed files)
        run: |
          make generate
          git diff --exit-code -- src/

      - name: Run corpus tests
        run: tree-sitter test

      - name: Query soundness — every captured node must resolve
        run: |
          set -e
          for q in queries/*.scm; do
            echo "checking $q"
            tree-sitter query "$q" examples/sample.hujson > /dev/null
          done

      - name: Sample parse — zero ERROR nodes
        run: |
          out=$(tree-sitter parse examples/sample.hujson)
          if echo "$out" | grep -q ERROR; then
            echo "ERROR nodes present:" >&2
            echo "$out" | grep ERROR >&2
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # bindings-smoke: build/load every language binding on all three OSes on each
  # PR, so binding or toolchain breakage surfaces here instead of only at tag
  # time when release.yml builds them for real (#54).
  # ---------------------------------------------------------------------------
  bindings-smoke:
    name: Bindings Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # The npm bundled with Node 22 ships node-gyp 11.x, which cannot detect
      # Visual Studio 2026 (v18) — now preinstalled on the windows-latest runner
      # image — and aborts native compilation with `unknown version "undefined"`.
      # node-gyp >= 12.1.0 adds VS 2026 support (nodejs/node-gyp#3282) and is
      # bundled from npm 11.6.3 onward, so upgrading npm is enough for both the
      # `install` lifecycle script and prebuildify. Linux/macOS are unaffected.
      - name: Upgrade npm for Visual Studio 2026 support (node-gyp >= 12.1.0)
        if: runner.os == 'Windows'
        run: npm install -g npm@latest

      - name: Node smoke — build and load the binding
        # Clean, reproducible install from the committed package-lock.json.
        shell: bash
        run: |
          npm ci --no-audit --no-fund
          node -e "require('./bindings/node')"

      # Pinned explicitly (same step as release.yml) rather than relying on the
      # runner images' preinstalled rustup default, so this job exercises the
      # exact toolchain setup the release path uses.
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Rust smoke — cargo check
        run: cargo check

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Python smoke — build a wheel
        shell: bash
        run: |
          python -m pip install --upgrade build
          python -m build --wheel

      # macos-latest (arm64) does not ship Go on PATH — install it explicitly.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false # repo has no Go build cache worth keeping; avoids go.sum cache-key noise

      - name: Go smoke — test the binding
        run: go test ./bindings/go/...

  # ---------------------------------------------------------------------------
  # fuzz: randomized edit fuzzing over the corpus to catch crashes and
  # incremental-parse divergence the fixed corpus tests cannot (#52).
  # ---------------------------------------------------------------------------
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # tree-sitter-cli is a pinned devDependency installed from the committed
      # package-lock.json; expose its bin so `tree-sitter` resolves to it.
      - name: Install pinned tree-sitter CLI and deps
        run: |
          npm ci --no-audit --no-fund
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Fuzz parser
        run: tree-sitter fuzz --iterations 50 --edits 3
