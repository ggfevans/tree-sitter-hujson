name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  grammar-test:
    name: Grammar Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli@0.26.9

      - name: Generate parser (must be a no-op against committed files)
        run: |
          make generate
          git diff --exit-code -- src/

      - name: Run corpus tests
        run: tree-sitter test

      - name: Query soundness — every captured node must resolve
        run: |
          set -e
          for q in queries/*.scm; do
            echo "checking $q"
            tree-sitter query "$q" examples/sample.hujson > /dev/null
          done

      - name: Sample parse — zero ERROR nodes
        run: |
          out=$(tree-sitter parse examples/sample.hujson)
          if echo "$out" | grep -q ERROR; then
            echo "ERROR nodes present:" >&2
            echo "$out" | grep ERROR >&2
            exit 1
          fi
