name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

# Minimal at the top level; the write scope lives only on the job that needs it.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      security-events: write # upload CodeQL results to code scanning
      packages: read # fetch CodeQL query packs
      actions: read # read workflow run metadata
    strategy:
      fail-fast: false
      matrix:
        # Only languages with code in this repo: generated C parser
        # (src/parser.c), JS grammar + node binding, Python binding, and
        # GitHub Actions workflow files. Do NOT add languages with no
        # source — a stale entry fails the job (see ggfevans/zed-hujson).
        # Rust is excluded: bindings/rust is generated glue exercised by
        # `cargo check` in CI, with no hand-written logic.
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: none
          - language: javascript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
