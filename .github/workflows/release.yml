name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # only this job needs to create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate tag format
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$'; then
            echo "::error::Tag '$TAG' does not match SemVer format (vX.Y.Z or vX.Y.Z-prerelease)"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest versions
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # scripts/bump-version.sh keeps the manifests in sync with each
          # other, but nothing stops tagging the wrong commit — so assert the
          # tag version matches every manifest before publishing anything.
          FAIL=0
          check() {
            if [ "$2" != "$VERSION" ]; then
              echo "::error file=$1::$1 version '$2' does not match tag version '$VERSION'"
              FAIL=1
            fi
          }
          check package.json "$(node -p 'require("./package.json").version')"
          check tree-sitter.json "$(node -p 'require("./tree-sitter.json").metadata.version')"
          check Cargo.toml "$(sed -nE 's/^version = "([^"]*)".*/\1/p' Cargo.toml | head -n 1)"
          check pyproject.toml "$(sed -nE 's/^version = "([^"]*)".*/\1/p' pyproject.toml | head -n 1)"
          check Makefile "$(sed -nE 's/^VERSION := (.*)$/\1/p' Makefile | head -n 1)"
          exit "$FAIL"

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the changelog section for this version.
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Escape regex-significant dots so e.g. 0.2.0 cannot match 0x2y0.
          ESCAPED_VERSION="$(printf '%s' "$VERSION" | sed 's/\./\\./g')"
          # Grab everything from this version's header up to and including the
          # next "## [" header (or EOF for the oldest entry).
          sed -n "/^## \[$ESCAPED_VERSION\]/,/^## \[/p" CHANGELOG.md > release_notes.md
          # The sed range is inclusive, so for any entry that is followed by a
          # later "## [" header that trailing header line is captured too. Strip
          # it — but ONLY if the last line is actually a "## [" header, so the
          # oldest entry (which ends at EOF, no trailing header) is not clipped.
          if tail -n 1 release_notes.md | grep -q '^## \['; then
            sed -i '$d' release_notes.md
          fi
          echo "Extracted release notes for v$VERSION"

      - name: Verify release notes exist
        run: |
          if [ ! -s release_notes.md ]; then
            echo "::error::No changelog entry found for v${{ steps.version.outputs.VERSION }}. Ensure CHANGELOG.md has a '## [X.Y.Z]' header matching this version."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # preflight: detect which registries are configured so each publish job below
  # can skip (not fail) when it isn't set up.
  # npm, PyPI, and crates.io all publish via OIDC Trusted Publishing (no stored
  # secrets) and are gated on the opt-in repo variables NPM_TRUSTED_PUBLISHER /
  # PYPI_TRUSTED_PUBLISHER / CRATES_TRUSTED_PUBLISHER ('true' once a trusted
  # publisher exists for this repo/workflow).
  # ---------------------------------------------------------------------------
  preflight:
    name: Detect configured registries
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      npm: ${{ steps.flags.outputs.npm }}
      crates: ${{ steps.flags.outputs.crates }}
      pypi: ${{ steps.flags.outputs.pypi }}
    steps:
      - id: flags
        env:
          NPM_FLAG: ${{ vars.NPM_TRUSTED_PUBLISHER }}
          CRATES_FLAG: ${{ vars.CRATES_TRUSTED_PUBLISHER }}
          PYPI_FLAG: ${{ vars.PYPI_TRUSTED_PUBLISHER }}
        run: |
          {
            echo "npm=$([ "$NPM_FLAG" = "true" ] && echo true || echo false)"
            echo "crates=$([ "$CRATES_FLAG" = "true" ] && echo true || echo false)"
            echo "pypi=$([ "$PYPI_FLAG" = "true" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # npm: build native prebuilds across linux/macOS/windows, then publish with
  # provenance via OIDC Trusted Publishing (no stored token). These jobs are
  # SKIPPED (not failed) until the repo variable NPM_TRUSTED_PUBLISHER is set to
  # 'true' (set it once an npm trusted publisher exists for this repo/workflow).
  # ---------------------------------------------------------------------------
  npm-prebuild:
    name: npm prebuild (${{ matrix.os }})
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.npm == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24 (LTS) bundles npm 11.9.0, whose node-gyp >= 12.1.0 detects
          # Visual Studio 2026 on the windows-latest runner — no npm self-upgrade
          # step needed (and none to trip OSSF Scorecard's Pinned-Dependencies).
          node-version: "24"

      - name: Install dependencies
        # Clean, reproducible install from the committed package-lock.json.
        run: npm ci --no-audit --no-fund

      - name: Build prebuilds
        run: npm run prebuildify

      - name: Upload prebuilds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/
          if-no-files-found: error

  npm-publish:
    name: npm publish
    needs: [npm-prebuild, preflight]
    if: ${{ needs.preflight.outputs.npm == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for OIDC Trusted Publishing and provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24 (LTS) bundles npm 11.9.0, which satisfies OIDC Trusted
          # Publishing's npm >= 11.5.1 requirement — no npm self-upgrade step
          # needed (and none to trip OSSF Scorecard's Pinned-Dependencies).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        # Clean, reproducible install from the committed package-lock.json.
        run: npm ci --no-audit --no-fund

      - name: Download all prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: true

      - name: Publish to npm
        # Auth is via OIDC Trusted Publishing (id-token: write above) — no
        # NODE_AUTH_TOKEN. npm detects the OIDC environment automatically and
        # attaches build provenance.
        run: npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # PyPI: build wheels (via the [tool.cibuildwheel] config) and an sdist, then
  # publish with OIDC Trusted Publishing — no stored token. These jobs are
  # SKIPPED until the repo variable PYPI_TRUSTED_PUBLISHER is set to 'true'
  # (set it once a PyPI trusted publisher exists for this repo/workflow).
  # ---------------------------------------------------------------------------
  pypi-wheels:
    name: PyPI wheels (${{ matrix.os }})
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  pypi-sdist:
    name: PyPI sdist
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  pypi-publish:
    name: PyPI publish
    needs: [pypi-wheels, pypi-sdist, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  # ---------------------------------------------------------------------------
  # crates.io: publish the Rust binding via OIDC Trusted Publishing — no stored
  # token. SKIPPED until the repo variable CRATES_TRUSTED_PUBLISHER is set to
  # 'true' (set it once a crates.io trusted publisher exists for this
  # repo/workflow).
  # ---------------------------------------------------------------------------
  crates-publish:
    name: crates.io publish
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.crates == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        # --locked asserts Cargo.lock is already in sync with Cargo.toml: if a
        # release commit ever ships a stale lockfile again, this fails fast with
        # a clear error instead of cargo silently regenerating the lock and then
        # aborting on a dirty working tree. scripts/bump-version.sh keeps the
        # lockfile synced, so the committed Cargo.lock should always satisfy this.
        run: cargo publish -p tree-sitter-hujson --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ---------------------------------------------------------------------------
  # Go / Swift / C bindings are consumed directly via the git tag
  # (go get / SwiftPM / pkg-config), so the tag + GitHub Release created above
  # is sufficient — no registry-publish step is required for them.
  # ---------------------------------------------------------------------------
