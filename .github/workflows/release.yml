name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # only this job needs to create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate tag format
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$'; then
            echo "::error::Tag '$TAG' does not match SemVer format (vX.Y.Z or vX.Y.Z-prerelease)"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the changelog section for this version.
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Escape regex-significant dots so e.g. 0.2.0 cannot match 0x2y0.
          ESCAPED_VERSION="$(printf '%s' "$VERSION" | sed 's/\./\\./g')"
          # Grab everything from this version's header up to and including the
          # next "## [" header (or EOF for the oldest entry).
          sed -n "/^## \[$ESCAPED_VERSION\]/,/^## \[/p" CHANGELOG.md > release_notes.md
          # The sed range is inclusive, so for any entry that is followed by a
          # later "## [" header that trailing header line is captured too. Strip
          # it — but ONLY if the last line is actually a "## [" header, so the
          # oldest entry (which ends at EOF, no trailing header) is not clipped.
          if tail -n 1 release_notes.md | grep -q '^## \['; then
            sed -i '$d' release_notes.md
          fi
          echo "Extracted release notes for v$VERSION"

      - name: Verify release notes exist
        run: |
          if [ ! -s release_notes.md ]; then
            echo "::error::No changelog entry found for v${{ steps.version.outputs.VERSION }}. Ensure CHANGELOG.md has a '## [X.Y.Z]' header matching this version."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # preflight: detect which registries are configured so each publish job below
  # can skip (not fail) when it isn't set up. GitHub Actions cannot reference
  # secrets.* in a job-level `if:`, so presence is surfaced here as job outputs.
  # npm and PyPI both publish via OIDC Trusted Publishing (no secret to detect)
  # and are gated on the opt-in repo variables NPM_TRUSTED_PUBLISHER /
  # PYPI_TRUSTED_PUBLISHER ('true' once a trusted publisher exists for this
  # repo/workflow). crates.io still authenticates with a token.
  # ---------------------------------------------------------------------------
  preflight:
    name: Detect configured registries
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      npm: ${{ steps.flags.outputs.npm }}
      crates: ${{ steps.flags.outputs.crates }}
      pypi: ${{ steps.flags.outputs.pypi }}
    steps:
      - id: flags
        env:
          NPM_FLAG: ${{ vars.NPM_TRUSTED_PUBLISHER }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PYPI_FLAG: ${{ vars.PYPI_TRUSTED_PUBLISHER }}
        run: |
          {
            echo "npm=$([ "$NPM_FLAG" = "true" ] && echo true || echo false)"
            echo "crates=$([ -n "$CARGO_REGISTRY_TOKEN" ] && echo true || echo false)"
            echo "pypi=$([ "$PYPI_FLAG" = "true" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # npm: build native prebuilds across linux/macOS/windows, then publish with
  # provenance via OIDC Trusted Publishing (no stored token). These jobs are
  # SKIPPED (not failed) until the repo variable NPM_TRUSTED_PUBLISHER is set to
  # 'true' (set it once an npm trusted publisher exists for this repo/workflow).
  # ---------------------------------------------------------------------------
  npm-prebuild:
    name: npm prebuild (${{ matrix.os }})
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.npm == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # The npm bundled with Node 22 ships node-gyp 11.x, which cannot detect
      # Visual Studio 2026 (v18) — now preinstalled on the windows-latest runner
      # image — and aborts native compilation with `unknown version "undefined"`.
      # node-gyp >= 12.1.0 adds VS 2026 support (nodejs/node-gyp#3282) and is
      # bundled from npm 11.6.3 onward, so upgrading npm is enough for both the
      # `install` lifecycle script and prebuildify. Linux/macOS are unaffected.
      - name: Upgrade npm for Visual Studio 2026 support (node-gyp >= 12.1.0)
        if: runner.os == 'Windows'
        run: npm install -g npm@latest

      - name: Install dependencies
        # This project intentionally ships no lockfile (Cargo.lock / go.sum are
        # gitignored too), so use `npm install` rather than `npm ci`, which
        # requires a committed package-lock.json.
        run: npm install --no-audit --no-fund

      - name: Build prebuilds
        run: npm run prebuildify

      - name: Upload prebuilds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/
          if-no-files-found: error

  npm-publish:
    name: npm publish
    needs: [npm-prebuild, preflight]
    if: ${{ needs.preflight.outputs.npm == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC Trusted Publishing and provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # OIDC Trusted Publishing requires npm >= 11.5.1; the npm bundled with
      # Node 22 is older. Upgrade before publishing.
      - name: Upgrade npm for OIDC Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        # This project intentionally ships no lockfile (Cargo.lock / go.sum are
        # gitignored too), so use `npm install` rather than `npm ci`, which
        # requires a committed package-lock.json.
        run: npm install --no-audit --no-fund

      - name: Download all prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: prebuilds-*
          path: prebuilds/
          merge-multiple: true

      - name: Publish to npm
        # Auth is via OIDC Trusted Publishing (id-token: write above) — no
        # NODE_AUTH_TOKEN. npm detects the OIDC environment automatically and
        # attaches build provenance.
        run: npm publish --provenance --access public

  # ---------------------------------------------------------------------------
  # PyPI: build wheels (via the [tool.cibuildwheel] config) and an sdist, then
  # publish with OIDC Trusted Publishing — no stored token. These jobs are
  # SKIPPED until the repo variable PYPI_TRUSTED_PUBLISHER is set to 'true'
  # (set it once a PyPI trusted publisher exists for this repo/workflow).
  # ---------------------------------------------------------------------------
  pypi-wheels:
    name: PyPI wheels (${{ matrix.os }})
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  pypi-sdist:
    name: PyPI sdist
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  pypi-publish:
    name: PyPI publish
    needs: [pypi-wheels, pypi-sdist, preflight]
    if: ${{ needs.preflight.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/

  # ---------------------------------------------------------------------------
  # crates.io: publish the Rust binding. Auth via secrets.CARGO_REGISTRY_TOKEN.
  # SKIPPED until that secret is configured.
  # ---------------------------------------------------------------------------
  crates-publish:
    name: crates.io publish
    needs: [release, preflight]
    if: ${{ needs.preflight.outputs.crates == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Publish to crates.io
        run: cargo publish -p tree-sitter-hujson
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ---------------------------------------------------------------------------
  # Go / Swift / C bindings are consumed directly via the git tag
  # (go get / SwiftPM / pkg-config), so the tag + GitHub Release created above
  # is sufficient — no registry-publish step is required for them.
  # ---------------------------------------------------------------------------
