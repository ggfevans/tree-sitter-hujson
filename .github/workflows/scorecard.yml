name: OpenSSF Scorecard

on:
  # Push on the default branch keeps the Branch-Protection signal current.
  push:
    branches: [main]
  schedule:
    - cron: "33 7 * * 1" # weekly, Monday 07:33 UTC

# Declare default permissions as read only.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API for the badge and
          # public dataset (https://securityscorecards.dev).
          publish_results: true

      - name: Upload SARIF results to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
